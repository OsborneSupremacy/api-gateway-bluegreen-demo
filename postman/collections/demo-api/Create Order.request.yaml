$kind: http-request
name: Create Order
url: "{{domain}}/v1/order"
method: POST
body:
  type: json
  content: >-
    {
      "customerId": "{{CustomerId}}",
      "currency": "{{$randomCurrencyCode}}",
      "shippingAddress": "{{$randomStreetAddress}}",
      "items": [
        {
          "sku": "SKU-{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}",
          "name": "{{$randomProductName}}",
          "quantity": {{$randomInt}},
          "unitPrice": {{$randomPrice}}
        }
      ]
    }
scripts:
  - type: beforeRequest
    code: |-
      const customerId = require('uuid').v4();
      pm.environment.set("CustomerId", customerId);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      if (pm.response.code === 201) {
          const orderId = pm.response.json().orderId;
          pm.environment.set("OrderId", orderId);
      }
    language: text/javascript
order: 638712352979
