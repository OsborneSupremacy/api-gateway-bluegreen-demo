$kind: http-request
name: Create Order
url: "{{domain}}/v1/order"
method: POST
body:
  type: json
  content: |-
    {
      "customerId": "{{$randomUUID}}",
      "currency": "{{$randomCurrencyCode}}",
      "shippingAddress": "{{$randomStreetAddress}}",
      "items": [
        {
          "sku": "SKU-{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}",
          "name": "{{$randomProductName}}",
          "quantity": {{$randomInt}},
          "unitPrice": {{$randomPrice}}
        }
      ]
    }
order: 1777411285741
