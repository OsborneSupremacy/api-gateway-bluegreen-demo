name: _ build authorizer lambda and apply terraform

on:
  workflow_call:
    inputs:
      tfstate_bucket:
        description: "Name of the S3 bucket to store Terraform state"
        required: true
        type: string
      tfstate_key:
        description: "Key for the authorizer Terraform state in the S3 bucket"
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Build & Deploy Authorizer
    # arm64 runner so the linux/arm64 Native AOT build container runs natively
    # (the build targets linux-arm64 / Graviton). An x64 runner would require
    # QEMU emulation, which makes AOT compilation prohibitively slow.
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build & package authorizer Lambda
        run: bash scripts/build-lambdas.sh authorizer

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: iac/authorizer
        run: |
          terraform init \
            -backend-config="bucket=${{ inputs.tfstate_bucket }}" \
            -backend-config="key=${{ inputs.tfstate_key }}" \
            -backend-config="region=us-east-1"

      - name: Terraform Validate
        working-directory: iac/authorizer
        run: terraform validate

      - name: Terraform Plan
        working-directory: iac/authorizer
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: iac/authorizer
        run: terraform apply -auto-approve tfplan
