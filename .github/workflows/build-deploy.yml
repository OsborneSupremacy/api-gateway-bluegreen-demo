name: Build & Deploy API Gateway and Lambda Functions

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      TF_VAR_api_token: ${{ secrets.API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build & package Lambdas
        run: bash scripts/build-lambdas.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: iac
        run: |
          terraform init \
            -backend-config="bucket=bro-tfstate" \
            -backend-config="key=ecommerce" \
            -backend-config="region=us-east-1"

      - name: Terraform Validate
        working-directory: iac
        run: terraform validate

      - name: Terraform Plan
        working-directory: iac
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: iac
        run: terraform apply -auto-approve tfplan
